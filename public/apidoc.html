<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarAnime API 文档</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-sidebar: #13161f;
    --bg-input: #0d0f16;
    --border: #2a2d3e;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --text-dim: #4a5568;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --orange: #f97316;
    --cyan: #06b6d4;
    --radius: 8px;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ===== 配置弹窗 ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    width: 460px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-header h2 { font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-section { margin-bottom: 20px; }
  .modal-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  .form-group input {
    width: 100%; padding: 9px 12px; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 13px; font-family: var(--font-mono); outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--primary); }
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn-primary {
    flex: 1; padding: 10px; background: var(--primary); color: #fff;
    border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-secondary {
    padding: 10px 20px; background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
  .modal-err { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; }
  .modal-tip { color: var(--text-dim); font-size: 12px; margin-top: 10px; text-align: center; }

  /* ===== 主界面 ===== */
  #app { display: none; height: 100vh; overflow: hidden; }
  .layout { display: flex; height: 100%; }

  /* 侧边栏 */
  .sidebar {
    width: 280px; flex-shrink: 0; background: var(--bg-sidebar);
    border-right: 1px solid var(--border); overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-header .logo { font-size: 20px; }
  .sidebar-header .title { font-size: 15px; font-weight: 700; }
  .sidebar-header .version {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    background: rgba(99,102,241,0.15); color: var(--primary);
    padding: 2px 8px; border-radius: 20px;
  }
  .sidebar-search {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%; padding: 7px 10px; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; outline: none;
  }
  .sidebar-search input:focus { border-color: var(--primary); }
  .nav-group { padding: 8px 0; }
  .nav-group-title {
    padding: 6px 16px; font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
    color: var(--text-dim); text-transform: uppercase;
  }
  .nav-item {
    padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-muted); transition: all 0.15s; border-radius: 0;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { background: rgba(99,102,241,0.08); color: var(--text); }
  .nav-item.active { background: rgba(99,102,241,0.12); color: var(--primary); border-left-color: var(--primary); }
  .nav-item .method-badge {
    font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    flex-shrink: 0; font-family: var(--font-mono);
  }
  .nav-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  /* 侧边栏底部配置区 */
  .sidebar-footer {
    margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border);
  }
  .server-status {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    font-size: 12px; color: var(--text-muted);
  }
  .server-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .server-dot.online { background: var(--green); }
  .server-url { font-family: var(--font-mono); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .footer-actions { display: flex; gap: 8px; }
  .btn-footer {
    flex: 1; padding: 6px 0; background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-muted); font-size: 12px; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .btn-footer:hover { border-color: var(--primary); color: var(--primary); }
  .btn-footer.active { background: rgba(99,102,241,0.1); border-color: var(--primary); color: var(--primary); }
  .user-badge {
    display: flex; align-items: center; gap: 8px; padding: 8px 0; margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%; background: var(--primary);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .user-info .name { font-size: 12px; font-weight: 600; }
  .user-info .role { font-size: 11px; color: var(--text-muted); }

  /* 主内容区 */
  .main { flex: 1; overflow-y: auto; padding: 0; }
  .welcome {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 12px; color: var(--text-muted);
  }
  .welcome .big-icon { font-size: 64px; }
  .welcome h2 { font-size: 20px; color: var(--text); }
  .welcome p { font-size: 14px; }

  /* API 详情 */
  .api-detail { padding: 32px 40px; max-width: 900px; }
  .api-title { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .api-title h1 { font-size: 22px; font-weight: 700; }
  .api-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }

  .method-path {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 24px;
    font-family: var(--font-mono); font-size: 14px;
  }
  .method-big {
    font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 4px;
    font-family: var(--font-mono);
  }
  .path-text { color: var(--text); }
  .auth-badge {
    margin-left: auto; font-size: 11px; padding: 2px 8px;
    border-radius: 4px; display: flex; align-items: center; gap: 4px;
  }
  .auth-badge.required { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .auth-badge.optional { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  .auth-badge.none { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .perm-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: rgba(139,92,246,0.12); color: var(--purple); border: 1px solid rgba(139,92,246,0.3);
  }

  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* 参数表格 */
  .param-table { width: 100%; border-collapse: collapse; }
  .param-table th {
    text-align: left; padding: 8px 12px; font-size: 12px; font-weight: 600;
    color: var(--text-dim); background: var(--bg-input); border-bottom: 1px solid var(--border);
  }
  .param-table th:first-child { border-radius: 6px 0 0 0; }
  .param-table th:last-child { border-radius: 0 6px 0 0; }
  .param-table td {
    padding: 9px 12px; font-size: 13px; border-bottom: 1px solid rgba(42,45,62,0.5);
    vertical-align: top;
  }
  .param-table tr:last-child td { border-bottom: none; }
  .param-table tr:hover td { background: rgba(255,255,255,0.02); }
  .param-name { font-family: var(--font-mono); color: var(--cyan); font-size: 12px; }
  .param-type { font-family: var(--font-mono); color: var(--yellow); font-size: 12px; }
  .param-required { color: var(--red); font-size: 12px; }
  .param-optional { color: var(--text-dim); font-size: 12px; }
  .param-desc { color: var(--text-muted); font-size: 12px; line-height: 1.5; }

  /* 代码块 */
  .code-block {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .code-header {
    display: flex; align-items: center; padding: 8px 14px;
    border-bottom: 1px solid var(--border); gap: 8px;
  }
  .code-lang { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }
  .btn-copy {
    margin-left: auto; padding: 3px 10px; background: transparent;
    border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted);
    font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .btn-copy:hover { border-color: var(--primary); color: var(--primary); }
  pre { padding: 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; overflow-x: auto; color: var(--text); }

  /* 调试面板 */
  .debug-panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 28px;
  }
  .debug-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .debug-header h3 { font-size: 13px; font-weight: 700; color: var(--text); }
  .debug-header .tip { font-size: 12px; color: var(--text-muted); }
  .btn-run {
    margin-left: auto; padding: 7px 18px; background: var(--primary);
    border: none; border-radius: 6px; color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s;
  }
  .btn-run:hover { background: var(--primary-dark); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
  .debug-body { padding: 16px; }
  .debug-row { margin-bottom: 14px; }
  .debug-row label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
  .debug-input {
    width: 100%; padding: 8px 12px; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text);
    font-size: 13px; font-family: var(--font-mono); outline: none; transition: border-color 0.2s;
  }
  .debug-input:focus { border-color: var(--primary); }
  textarea.debug-input { min-height: 90px; resize: vertical; line-height: 1.6; }
  .debug-params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .debug-param-item label { font-size: 11px; }

  .debug-response { padding: 16px; border-top: 1px solid var(--border); }
  .response-meta {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 12px;
  }
  .res-status { font-weight: 700; font-family: var(--font-mono); }
  .res-status.ok { color: var(--green); }
  .res-status.err { color: var(--red); }
  .res-time { color: var(--text-muted); }
  .res-size { color: var(--text-muted); }

  /* 方法颜色 */
  .m-GET    { background: rgba(16,185,129,0.15); color: var(--green); }
  .m-POST   { background: rgba(59,130,246,0.15); color: var(--blue); }
  .m-PUT    { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .m-DELETE { background: rgba(239,68,68,0.15); color: var(--red); }
  .m-PATCH  { background: rgba(139,92,246,0.15); color: var(--purple); }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* 标签 */
  .tag {
    display: inline-block; font-size: 11px; padding: 1px 7px;
    border-radius: 4px; font-weight: 600;
  }
  .tag-deprecated { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

  /* 空状态 */
  .empty-response {
    color: var(--text-dim); font-size: 13px; text-align: center; padding: 20px 0;
    font-family: var(--font-mono);
  }

  /* Token 状态 */
  .token-status {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted);
    padding: 8px 14px; background: var(--bg-input); border-radius: 6px;
    border: 1px solid var(--border); margin-bottom: 12px;
  }
  .token-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .token-dot.off { background: var(--text-dim); }
  .token-val { font-family: var(--font-mono); color: var(--cyan); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 280px; }
  .btn-clear-token {
    margin-left: auto; padding: 2px 8px; background: transparent;
    border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted);
    font-size: 11px; cursor: pointer;
  }
  .btn-clear-token:hover { border-color: var(--red); color: var(--red); }

  /* Tabs */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab-btn {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  /* JSON 高亮 */
  .json-string { color: #a3e635; }
  .json-number { color: #fb923c; }
  .json-boolean { color: #818cf8; }
  .json-null { color: #94a3b8; }
  .json-key { color: #7dd3fc; }

  @media (max-width: 768px) {
    .sidebar { width: 220px; }
    .api-detail { padding: 20px; }
  }
</style>
</head>
<body>

<!-- 配置弹窗（服务地址 + 可选登录） -->
<div class="modal-overlay" id="config-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>⚙️ 接口配置</h2>
      <button class="modal-close" onclick="closeConfigModal()">×</button>
    </div>

    <!-- 服务地址 -->
    <div class="modal-section">
      <div class="modal-section-title">服务地址</div>
      <div class="form-group">
        <label>API Base URL</label>
        <input type="text" id="cfg-base-url" placeholder="http://localhost:8080/api" />
      </div>
    </div>

    <!-- 可选登录 -->
    <div class="modal-section">
      <div class="modal-section-title">账号登录（可选）登录后自动携带 Token</div>
      <div class="form-group">
        <label>用户名 / 邮箱</label>
        <input type="text" id="cfg-username" placeholder="留空则以游客身份浏览" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="cfg-password" placeholder="留空则不登录" autocomplete="current-password" />
      </div>
    </div>

    <div class="modal-err" id="cfg-err"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeConfigModal()">取消</button>
      <button class="btn-primary" id="cfg-save-btn" onclick="saveConfig()">保存并连接</button>
    </div>
    <div class="modal-tip">💡 不登录也可以查看文档和调试公开接口</div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div class="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">🌟</span>
        <span class="title">StarAnime API</span>
        <span class="version">v1.0</span>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="搜索接口..." id="search-input" oninput="filterNav(this.value)" />
      </div>
      <div id="nav-container"></div>
      <div class="sidebar-footer">
        <!-- 已登录用户信息（有登录时才显示） -->
        <div class="user-badge" id="user-badge" style="display:none">
          <div class="user-avatar" id="user-avatar-text">U</div>
          <div class="user-info">
            <div class="name" id="user-display-name">-</div>
            <div class="role" id="user-display-role">-</div>
          </div>
        </div>
        <!-- 服务地址状态 -->
        <div class="server-status">
          <div class="server-dot" id="server-dot"></div>
          <span class="server-url" id="server-url-display">未配置服务地址</span>
        </div>
        <!-- 操作按钮 -->
        <div class="footer-actions">
          <button class="btn-footer" onclick="openConfigModal()" id="btn-config">⚙️ 配置</button>
          <button class="btn-footer" onclick="doLogout()" id="btn-logout" style="display:none">退出登录</button>
        </div>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main" id="main-content">
      <div class="welcome">
        <div class="big-icon">📖</div>
        <h2>StarAnime API 文档</h2>
        <p>从左侧选择接口开始探索</p>
      </div>
    </main>
  </div>
</div>

<script>
// =====================================================
// API 数据
// =====================================================
const API_GROUPS = [
  {
    id: 'auth',
    name: '🔐 认证',
    apis: [
      {
        id: 'auth-register',
        method: 'POST',
        path: '/auth/register',
        name: '用户注册',
        desc: '注册新用户账号。注册功能可由管理员在系统设置中开启/关闭，关闭后返回 403。',
        auth: 'none',
        bodyParams: [
          { name: 'username', type: 'string', required: true, desc: '用户名，唯一' },
          { name: 'password', type: 'string', required: true, desc: '密码' },
          { name: 'email', type: 'string', required: true, desc: '邮箱，唯一' },
          { name: 'nickname', type: 'string', required: false, desc: '昵称，默认与用户名相同' },
        ],
        bodyExample: '{\n  "username": "testuser",\n  "password": "123456",\n  "email": "test@example.com",\n  "nickname": "测试用户"\n}',
        respExample: '{\n  "code": 200,\n  "message": "注册成功",\n  "data": {\n    "id": 1,\n    "username": "testuser",\n    "email": "test@example.com"\n  }\n}',
      },
      {
        id: 'auth-login',
        method: 'POST',
        path: '/auth/login',
        name: '用户登录',
        desc: '使用用户名/邮箱和密码登录，获取 JWT Token。Token 需在后续请求的 Authorization 头中携带。',
        auth: 'none',
        bodyParams: [
          { name: 'username', type: 'string', required: true, desc: '用户名或邮箱' },
          { name: 'password', type: 'string', required: true, desc: '密码' },
        ],
        bodyExample: '{\n  "username": "admin",\n  "password": "123456"\n}',
        respExample: '{\n  "code": 200,\n  "message": "登录成功",\n  "data": {\n    "token": "eyJhbGci...",\n    "user": {\n      "id": 1,\n      "username": "admin",\n      "email": "admin@example.com",\n      "nickname": "管理员",\n      "avatar": null,\n      "role": 3,\n      "certifications": []\n    }\n  }\n}',
      },
      {
        id: 'auth-refresh',
        method: 'POST',

// =====================================================
// 配置与状态
// =====================================================
let API_BASE = localStorage.getItem('apidoc_base') || 'http://localhost:8080/api'
let currentToken = localStorage.getItem('apidoc_token') || ''
let currentUser = JSON.parse(localStorage.getItem('apidoc_user') || 'null')
let currentApiId = null
let allApis = []

// 展平所有 API
API_GROUPS.forEach(g => g.apis.forEach(a => { a.groupName = g.name; allApis.push(a) }))

// =====================================================
// 配置弹窗
// =====================================================
function openConfigModal() {
  document.getElementById('cfg-base-url').value = API_BASE
  document.getElementById('cfg-username').value = ''
  document.getElementById('cfg-password').value = ''
  document.getElementById('cfg-err').textContent = ''
  document.getElementById('cfg-save-btn').textContent = '保存并连接'
  document.getElementById('config-modal').classList.add('open')
}

function closeConfigModal() {
  document.getElementById('config-modal').classList.remove('open')
}

// 点击遮罩关闭
document.getElementById('config-modal').addEventListener('click', function(e) {
  if (e.target === this) closeConfigModal()
})

async function saveConfig() {
  const baseUrl = document.getElementById('cfg-base-url').value.trim()
  const username = document.getElementById('cfg-username').value.trim()
  const password = document.getElementById('cfg-password').value.trim()
  const errEl = document.getElementById('cfg-err')
  const btn = document.getElementById('cfg-save-btn')

  if (!baseUrl) { errEl.textContent = '请填写服务地址'; return }

  // 保存服务地址
  API_BASE = baseUrl.replace(/\/$/, '')
  localStorage.setItem('apidoc_base', API_BASE)
  updateServerStatus()

  // 没填账号密码 → 仅保存地址，不登录
  if (!username && !password) {
    closeConfigModal()
    renderNav()
    return
  }
  if (!password) { errEl.textContent = '填写了用户名，请同时填写密码'; return }

  // 尝试登录
  btn.disabled = true; btn.textContent = '登录中...'
  errEl.textContent = ''
  try {
    const resp = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    const data = await resp.json()
    if (data.code === 200) {
      currentToken = data.data.token
      currentUser = data.data.user
      localStorage.setItem('apidoc_token', currentToken)
      localStorage.setItem('apidoc_user', JSON.stringify(currentUser))
      updateUserInfo()
      closeConfigModal()
      renderNav()
    } else {
      errEl.textContent = data.message || '登录失败，请检查账号密码'
    }
  } catch (e) {
    errEl.textContent = '无法连接到服务器，请检查服务地址是否正确'
  }
  btn.disabled = false; btn.textContent = '保存并连接'
}

// 回车触发保存
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('config-modal').classList.contains('open')) {
    saveConfig()
  }
})

function doLogout() {
  localStorage.removeItem('apidoc_token')
  localStorage.removeItem('apidoc_user')
  currentToken = ''; currentUser = null
  updateUserInfo()
  renderNav()
}

// =====================================================
// 更新界面状态
// =====================================================
function updateServerStatus() {
  const dot = document.getElementById('server-dot')
  const urlEl = document.getElementById('server-url-display')
  const btnConfig = document.getElementById('btn-config')
  urlEl.textContent = API_BASE
  dot.className = 'server-dot online'
  btnConfig.classList.add('active')
}

function updateUserInfo() {
  const badge = document.getElementById('user-badge')
  const btnLogout = document.getElementById('btn-logout')
  if (currentUser) {
    const roleMap = { 0: '普通用户', 1: '博主', 2: '运营', 3: '管理员' }
    document.getElementById('user-display-name').textContent = currentUser.nickname || currentUser.username
    document.getElementById('user-display-role').textContent = roleMap[currentUser.role] || '未知'
    const initial = (currentUser.nickname || currentUser.username || 'U')[0].toUpperCase()
    document.getElementById('user-avatar-text').textContent = initial
    badge.style.display = 'flex'
    btnLogout.style.display = 'block'
  } else {
    badge.style.display = 'none'
    btnLogout.style.display = 'none'
  }
}

// =====================================================
// 导航渲染
// =====================================================
function renderNav(filter = '') {
  const container = document.getElementById('nav-container')
  let html = ''
  const kw = filter.toLowerCase()
  API_GROUPS.forEach(group => {
    const apis = group.apis.filter(a =>
      !kw || a.name.toLowerCase().includes(kw) || a.path.toLowerCase().includes(kw)
    )
    if (!apis.length) return
    html += `<div class="nav-group">`
    html += `<div class="nav-group-title">${group.name}</div>`
    apis.forEach(api => {
      const active = api.id === currentApiId ? 'active' : ''
      html += `<div class="nav-item ${active}" onclick="showApi('${api.id}')">
        <span class="method-badge m-${api.method}">${api.method}</span>
        <span class="name">${api.name}</span>
      </div>`
    })
    html += `</div>`
  })
  container.innerHTML = html
}

function filterNav(val) { renderNav(val) }

// =====================================================
// 显示 API 详情
// =====================================================
function showApi(id) {
  const api = allApis.find(a => a.id === id)
  if (!api) return
  currentApiId = id
  renderNav(document.getElementById('search-input').value)

  const authLabel = { required: '需要认证', optional: '可选认证', none: '无需认证' }
  const authClass = { required: 'required', optional: 'optional', none: 'none' }
  const authIcon  = { required: '🔒', optional: '🔑', none: '🌐' }

  let html = `<div class="api-detail">`
  html += `<div class="api-title">
    <span class="method-big m-${api.method}">${api.method}</span>
    <h1>${api.name}</h1>
    ${api.perm ? `<span class="perm-badge">${api.perm}</span>` : ''}
  </div>`
  if (api.desc) html += `<div class="api-desc">${api.desc}</div>`

  html += `<div class="method-path">
    <span class="method-big m-${api.method}">${api.method}</span>
    <span class="path-text">${api.path}</span>
    <span class="auth-badge ${authClass[api.auth]}">${authIcon[api.auth]} ${authLabel[api.auth]}</span>
  </div>`

  if (api.pathParams && api.pathParams.length) html += renderParamTable('路径参数 PATH', api.pathParams)
  if (api.queryParams && api.queryParams.length) html += renderParamTable('查询参数 QUERY', api.queryParams)
  if (api.bodyParams && api.bodyParams.length) html += renderParamTable('请求体 BODY (application/json)', api.bodyParams)

  if (api.bodyExample) {
    html += `<div class="section">
      <div class="section-title">请求示例</div>
      ${renderCodeBlock(api.bodyExample, 'json')}
    </div>`
  }
  if (api.respExample) {
    html += `<div class="section">
      <div class="section-title">响应示例</div>
      ${renderCodeBlock(api.respExample, 'json')}
    </div>`
  }

  html += renderDebugPanel(api)
  html += `</div>`
  document.getElementById('main-content').innerHTML = html
  document.getElementById('main-content').scrollTop = 0

  if (api.bodyExample && !api.bodyExample.includes('multipart')) {
    const ta = document.getElementById('debug-body')
    if (ta) ta.value = api.bodyExample
  }
}

function renderParamTable(title, params) {
  let html = `<div class="section">
    <div class="section-title">${title}</div>
    <table class="param-table">
      <thead><tr>
        <th style="width:140px">参数名</th>
        <th style="width:80px">类型</th>
        <th style="width:60px">必填</th>
        <th>说明</th>
      </tr></thead><tbody>`
  params.forEach(p => {
    html += `<tr>
      <td><span class="param-name">${p.name}</span></td>
      <td><span class="param-type">${p.type}</span></td>
      <td>${p.required ? '<span class="param-required">✓ 必填</span>' : '<span class="param-optional">选填</span>'}</td>
      <td><span class="param-desc">${p.desc || ''}</span></td>
    </tr>`
  })
  html += `</tbody></table></div>`
  return html
}

function renderCodeBlock(code, lang = 'json') {
  const id = 'cb-' + Math.random().toString(36).slice(2)
  return `<div class="code-block">
    <div class="code-header">
      <span class="code-lang">${lang}</span>
      <button class="btn-copy" onclick="copyCode('${id}')">复制</button>
    </div>
    <pre id="${id}">${escHtml(code)}</pre>
  </div>`
}

function renderDebugPanel(api) {
  const needsBody = ['POST', 'PUT', 'PATCH'].includes(api.method)
  const hasPath = api.pathParams && api.pathParams.length
  const hasQuery = api.queryParams && api.queryParams.length

  const tokenTip = currentToken
    ? `<span>已携带 Token：</span><span class="token-val">${currentToken.slice(0,40)}...</span>
       <button class="btn-clear-token" onclick="clearDebugToken()">清除</button>`
    : `<span style="color:var(--text-dim)">未登录，公开接口可直接调试；需要认证的接口请先在底部配置处登录</span>`

  let html = `<div class="debug-panel">
    <div class="debug-header">
      <h3>⚡ 在线调试</h3>
      <span class="tip">目标：${API_BASE}</span>
      <button class="btn-run" id="btn-run" onclick="runApi('${api.id}')">▶ 发送请求</button>
    </div>
    <div class="debug-body">
      <div class="token-status">
        <div class="token-dot ${currentToken ? '' : 'off'}"></div>
        ${tokenTip}
      </div>`

  if (hasPath) {
    html += `<div class="debug-row"><label>路径参数</label><div class="debug-params-grid">`
    api.pathParams.forEach(p => {
      html += `<div class="debug-param-item">
        <label><span class="param-name">${p.name}</span> <span class="param-type">${p.type}</span>
          ${p.required ? '<span class="param-required">*</span>' : ''}</label>
        <input class="debug-input" id="pparam-${p.name}" placeholder="${p.desc || ''}" />
      </div>`
    })
    html += `</div></div>`
  }

  if (hasQuery) {
    html += `<div class="debug-row"><label>查询参数 (Query)</label><div class="debug-params-grid">`
    api.queryParams.forEach(p => {
      html += `<div class="debug-param-item">
        <label><span class="param-name">${p.name}</span> <span class="param-type">${p.type}</span>
          ${p.required ? '<span class="param-required">*</span>' : ''}</label>
        <input class="debug-input" id="qparam-${p.name}" placeholder="${p.desc || ''}" />
      </div>`
    })
    html += `</div></div>`
  }

  if (needsBody) {
    html += `<div class="debug-row">
      <label>请求体 (JSON)</label>
      <textarea class="debug-input" id="debug-body" placeholder='{ "key": "value" }'>${api.bodyExample && !api.bodyExample.includes('multipart') ? api.bodyExample : ''}</textarea>
    </div>`
  }

  html += `<div class="debug-row">
    <label>自定义 Token（可选，留空使用已登录 Token）</label>
    <input class="debug-input" id="custom-token" placeholder="Bearer xxxxx 或直接填 token 字符串" />
  </div>`

  html += `</div><div id="debug-response"></div></div>`
  return html
}

// =====================================================
// 执行请求
// =====================================================
async function runApi(id) {
  const api = allApis.find(a => a.id === id)
  if (!api) return

  const btn = document.getElementById('btn-run')
  btn.disabled = true; btn.textContent = '请求中...'

  let url = API_BASE + api.path
  if (api.pathParams) {
    api.pathParams.forEach(p => {
      const val = document.getElementById(`pparam-${p.name}`)?.value?.trim()
      if (val) url = url.replace(`:${p.name}`, encodeURIComponent(val))
    })
  }
  const qp = new URLSearchParams()
  if (api.queryParams) {
    api.queryParams.forEach(p => {
      const val = document.getElementById(`qparam-${p.name}`)?.value?.trim()
      if (val) qp.set(p.name, val)
    })
  }
  if ([...qp].length) url += '?' + qp.toString()

  const customToken = document.getElementById('custom-token')?.value?.trim()
  let token = customToken || currentToken
  if (token && !token.startsWith('Bearer ')) token = 'Bearer ' + token

  const headers = {}
  if (token) headers['Authorization'] = token
  const needsBody = ['POST', 'PUT', 'PATCH'].includes(api.method)
  let body = null
  if (needsBody) {
    const bodyVal = document.getElementById('debug-body')?.value?.trim()
    if (bodyVal) { headers['Content-Type'] = 'application/json'; body = bodyVal }
  }

  const startTime = Date.now()
  const respEl = document.getElementById('debug-response')
  respEl.innerHTML = `<div style="padding:16px;color:var(--text-muted);font-size:13px">⏳ 请求中...</div>`

  try {
    const resp = await fetch(url, { method: api.method, headers, body })
    const elapsed = Date.now() - startTime
    const text = await resp.text()
    let parsed, isJson = false
    try { parsed = JSON.parse(text); isJson = true } catch {}
    const size = new Blob([text]).size

    const statusClass = resp.ok ? 'ok' : 'err'
    let respHtml = `<div class="debug-response">
      <div class="response-meta">
        <span class="res-status ${statusClass}">${resp.status} ${resp.statusText}</span>
        <span class="res-time">⏱ ${elapsed}ms</span>
        <span class="res-size">📦 ${formatSize(size)}</span>
      </div>`

    if (isJson) {
      const pretty = JSON.stringify(parsed, null, 2)
      respHtml += `<div class="code-block">
        <div class="code-header">
          <span class="code-lang">json (response)</span>
          <button class="btn-copy" onclick="copyText(${JSON.stringify(pretty).replace(/'/g,"&#39;")})">复制</button>
        </div>
        <pre>${syntaxHighlight(pretty)}</pre>
      </div>`
    } else {
      respHtml += `<div class="code-block"><div class="code-header"><span class="code-lang">text</span></div><pre>${escHtml(text.slice(0,2000))}</pre></div>`
    }
    respHtml += `</div>`
    respEl.innerHTML = respHtml
  } catch (e) {
    respEl.innerHTML = `<div class="debug-response"><div class="response-meta"><span class="res-status err">请求失败</span></div><div style="color:var(--red);font-size:13px;padding:8px 0">${e.message}</div></div>`
  }
  btn.disabled = false; btn.textContent = '▶ 发送请求'
}

function clearDebugToken() {
  currentToken = ''
  localStorage.removeItem('apidoc_token')
  showApi(currentApiId)
}

// =====================================================
// 工具函数
// =====================================================
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function syntaxHighlight(json) {
  return escHtml(json).replace(
    /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m => {
      let cls = 'json-number'
      if (/^"/.test(m)) { cls = /:$/.test(m) ? 'json-key' : 'json-string' }
      else if (/true|false/.test(m)) cls = 'json-boolean'
      else if (/null/.test(m)) cls = 'json-null'
      return `<span class="${cls}">${m}</span>`
    }
  )
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B'
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB'
  return (bytes/1024/1024).toFixed(2) + ' MB'
}

function copyCode(id) {
  const el = document.getElementById(id)
  if (!el) return
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.parentElement.querySelector('.btn-copy')
    if (btn) { btn.textContent = '✓ 已复制'; setTimeout(() => btn.textContent = '复制', 1500) }
  })
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {})
}

// =====================================================
// 初始化：直接进入主界面
// =====================================================
document.getElementById('app').style.display = 'flex'
updateUserInfo()
updateServerStatus()
renderNav()

// 如果没有保存过服务地址，提示配置
if (!localStorage.getItem('apidoc_base')) {
  setTimeout(openConfigModal, 500)
}
</script>
